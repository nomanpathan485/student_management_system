<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Records</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        html{
            scroll-behavior:smooth;
        }

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#4f46e5,#7c3aed,#0ea5e9);
            overflow-x:hidden;
            overflow-y:auto;
            padding:30px;
            color:white;
        }

        .circle{
            position:absolute;
            border-radius:50%;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(5px);
        }

        .circle1{
            width:260px;
            height:260px;
            top:-80px;
            left:-70px;
        }

        .circle2{
            width:180px;
            height:180px;
            bottom:-60px;
            right:-40px;
        }

        .container{
            max-width:1100px;
            margin:auto;
            background:rgba(255,255,255,0.12);
            border:1px solid rgba(255,255,255,0.2);
            backdrop-filter:blur(18px);
            border-radius:30px;
            padding:30px;
            position:relative;
            z-index:10;
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
            flex-wrap:wrap;
        }

        .back-btn{
            text-decoration:none;
            background:white;
            color:#4f46e5;
            padding:10px 15px;
            border-radius:10px;
            font-weight:600;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            padding:15px;
            text-align:left;
        }

        thead{
            background:rgba(255,255,255,0.15);
        }

        tbody tr:hover{
            background:rgba(255,255,255,0.08);
        }

        .id{
            background:rgba(255,255,255,0.15);
            padding:5px 10px;
            border-radius:20px;
        }

        .delete-btn{
            background:#ef4444;
            color:white;
            padding:8px 12px;
            border-radius:8px;
            text-decoration:none;
        }

        .delete-btn:hover{
            background:#dc2626;
        }

        .empty{
            text-align:center;
            padding:40px;
        }

    </style>

</head>

<body>

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <div class="container">

        <div class="header">
            <h1>Student Records</h1>

            <a class="back-btn" href="/">
                <i class="fa fa-arrow-left"></i> Back
            </a>
        </div>

        {% if students %}

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Marks</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>

                {% for student in students %}

                <tr>
                    <td><span class="id">#{{ student[0] }}</span></td>
                    <td>{{ student[1] }}</td>
                    <td>{{ student[2] }}%</td>
                    <td>
                        <a class="delete-btn" href="/delete/{{ student[0] }}">
                            Delete
                        </a>
                    </td>
                </tr>

                {% endfor %}

            </tbody>

        </table>

        {% else %}

        <div class="empty">
            No students found
        </div>

        {% endif %}

    </div>

</body>

</html>
