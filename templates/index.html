<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Management System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        html{
            scroll-behavior:smooth;
        }

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#4f46e5,#7c3aed,#0ea5e9);
            overflow-x:hidden;
            overflow-y:auto;
            padding:20px;
        }

        .circle{
            position:absolute;
            border-radius:50%;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(5px);
        }

        .circle1{
            width:260px;
            height:260px;
            top:-80px;
            left:-70px;
        }

        .circle2{
            width:180px;
            height:180px;
            bottom:-60px;
            right:-40px;
        }

        .container{
            max-width:1100px;
            margin:auto;
            display:grid;
            grid-template-columns:1fr 1fr;
            background:rgba(255,255,255,0.12);
            border:1px solid rgba(255,255,255,0.2);
            backdrop-filter:blur(18px);
            border-radius:30px;
            overflow:hidden;
            box-shadow:0 8px 40px rgba(0,0,0,0.25);
            position:relative;
            z-index:10;
        }

        .left-panel{
            padding:60px;
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .logo{
            width:85px;
            height:85px;
            border-radius:50%;
            background:rgba(255,255,255,0.15);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:36px;
            margin-bottom:25px;
        }

        h1{
            font-size:42px;
            margin-bottom:15px;
        }

        .description{
            opacity:0.9;
            margin-bottom:30px;
            line-height:1.6;
        }

        .form-panel{
            background:white;
            padding:60px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .form-panel h2{
            margin-bottom:25px;
        }

        .input-box{
            position:relative;
            margin-bottom:20px;
        }

        .input-box i{
            position:absolute;
            left:15px;
            top:50%;
            transform:translateY(-50%);
            color:#666;
        }

        .input-box input{
            width:100%;
            padding:14px 14px 14px 45px;
            border:none;
            border-radius:12px;
            background:#f1f5f9;
            outline:none;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            color:white;
            font-weight:600;
            cursor:pointer;
            margin-top:10px;
        }

        .view-btn{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            color:#4f46e5;
            font-weight:600;
        }

        @media(max-width:900px){
            .container{
                grid-template-columns:1fr;
            }
        }

    </style>

</head>

<body>

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <div class="container">

        <div class="left-panel">

            <div class="logo">
                <i class="fa-solid fa-user-graduate"></i>
            </div>

            <h1>Student System</h1>

            <p class="description">
                Manage student records easily with a modern dashboard interface.
            </p>

        </div>

        <div class="form-panel">

            <h2>Add Student</h2>

            <form action="/add" method="POST">

                <div class="input-box">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="name" placeholder="Student Name" required>
                </div>

                <div class="input-box">
                    <i class="fa-solid fa-chart-column"></i>
                    <input type="number" name="marks" placeholder="Marks" required>
                </div>

                <button type="submit">
                    Add Student
                </button>

            </form>

            <a class="view-btn" href="/students">
                View Students
            </a>

        </div>

    </div>

</body>

</html>
